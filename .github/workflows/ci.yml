name: CI

on:
  pull_request:
    branches:
      - develop

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-uefi
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy (bootloader)
        working-directory: bootloader
        run: cargo clippy
      - name: Clippy (support/console)
        working-directory: support/console
        run: cargo clippy

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-uefi
      - uses: Swatinem/rust-cache@v2
      - run: cargo xtask build
